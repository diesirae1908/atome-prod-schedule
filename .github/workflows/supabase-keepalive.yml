name: Supabase Keepalive

on:
  schedule:
    # Runs every 3 days at 08:00 UTC — Supabase pauses after 7 days of inactivity
    - cron: '0 8 */3 * *'
  workflow_dispatch: # allow manual trigger

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://ktbbmtyesrprvxrseiph.supabase.co/rest/v1/checks?select=key&limit=1" \
            -H "apikey: sb_publishable_1vfCHnng8kWfUGFtOt9Dmw_Rzkn8M62" \
            -H "Authorization: Bearer sb_publishable_1vfCHnng8kWfUGFtOt9Dmw_Rzkn8M62")
          echo "Supabase responded: HTTP $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️  Unexpected status — Supabase may be paused. Check https://supabase.com/dashboard"
            exit 1
          fi
          echo "✅ Supabase is alive"
