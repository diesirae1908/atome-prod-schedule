name: Refresh Production Schedule

on:
  schedule:
    # Runs every day at 21:00 UTC = 22:00 CET (winter) / 23:00 CEST (summer) ≈ 10pm Paris
    - cron: "0 21 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions UI

permissions:
  contents: write   # allows the bot to commit and push schedule.json

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch schedule from Odoo
        env:
          ODOO_URL:     ${{ secrets.ODOO_URL }}
          ODOO_DB:      ${{ secrets.ODOO_DB }}
          ODOO_USER:    ${{ secrets.ODOO_USER }}
          ODOO_API_KEY: ${{ secrets.ODOO_API_KEY }}
        run: |
          python scripts/fetch_schedule.py --weeks 3

      - name: Commit and push updated schedule
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schedule.json
          # Only commit if there are actual changes
          git diff --cached --quiet || git commit -m "chore: auto-refresh schedule $(date -u +%Y-%m-%d)"
          git push
