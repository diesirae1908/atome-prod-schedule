name: Remind — Rotate Odoo API Key

on:
  schedule:
    # Fires June 15 at 09:00 UTC — ~2 weeks before the current key expires (~June 30 2026)
    # After rotating, update this date to 2.5 months after the new key was created.
    - cron: '0 9 15 6 *'
  workflow_dispatch: # allow manual trigger to test

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Open reminder issue
        uses: actions/github-script@v7
        with:
          script: |
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              state: 'open',
              labels: 'key-rotation',
            });
            // Don't spam — skip if a reminder is already open
            if (existing.length > 0) {
              console.log('Reminder issue already open — skipping.');
              return;
            }
            await github.rest.issues.create({
              owner:  context.repo.owner,
              repo:   context.repo.repo,
              title:  '🔑 Rotate Odoo API key — expires in ~2 weeks',
              labels: ['key-rotation'],
              body: `## Odoo API Key Rotation

The API key for \`operations@atomebakery.com\` was created in late March 2026 and **expires around June 30 2026**.

### How to rotate (takes ~2 minutes)

1. Log into Odoo as \`operations@atomebakery.com\`
2. Top-right avatar → **Preferences** → **Account Security** → **API Keys**
3. Delete the expiring key → **New API Key** → copy the value
4. Tell the AI assistant:
   > "Update the Odoo API key on Render — here's the new one: \`<paste key>\`"
   
   It will call the Render API to update \`ODOO_API_KEY\` in seconds.

5. **Update this workflow**: change the cron date to ~2.5 months after the new key was created so the next reminder fires on time.

---
*This issue was opened automatically by the \`remind-rotate-api-key\` workflow.*`,
            });
