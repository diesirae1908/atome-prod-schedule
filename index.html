<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atome Bakery – Production Schedule</title>
  <style>
    /* ── reset & base ──────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --col-mon: #fff;
      --col-sat: #fafafa;
      --today-bg: #fff8e1;
      --today-border: #f59e0b;

      --mix-hd:   #7c3aed;   /* purple  */
      --mix-row:  #f5f3ff;
      --mix-alt:  #ede9fe;

      --shape-hd: #0284c7;   /* blue    */
      --shape-row: #f0f9ff;
      --shape-alt: #e0f2fe;

      --vac-hd:   #059669;   /* green   */
      --vac-row:  #f0fdf4;
      --vac-alt:  #dcfce7;

      --pack-hd:  #b45309;   /* amber – copacked/packaging only */
      --pack-row: #fffbeb;

      --border: #e5e7eb;
      --text: #111827;
      --muted: #6b7280;
      --badge-bg: #e5e7eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: #f3f4f6;
    }

    /* ── header bar ────────────────────────────────────────────────────────── */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      background: #1e1b4b;
      color: #fff;
      box-shadow: 0 2px 8px rgba(0,0,0,.25);
    }
    .topbar h1 { font-size: 17px; font-weight: 700; letter-spacing: .02em; }
    .topbar .meta { font-size: 11px; color: #c7d2fe; text-align: right; line-height: 1.5; }
    .topbar .week-badge {
      background: #4338ca; color: #fff;
      padding: 3px 10px; border-radius: 12px;
      font-size: 13px; font-weight: 600; margin-right: 12px;
    }

    /* ── legend ─────────────────────────────────────────────────────────────── */
    .legend {
      display: flex; gap: 16px; padding: 8px 20px;
      background: #fff; border-bottom: 1px solid var(--border);
      flex-wrap: wrap;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 3px; }

    /* ── wrapper ─────────────────────────────────────────────────────────────── */
    .schedule-wrap {
      overflow-x: auto;
      padding: 16px;
    }

    /* ── main grid table ───────────────────────────────────────────────────── */
    table.schedule {
      border-collapse: collapse;
      width: 100%;
      min-width: 900px;
      background: #fff;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,.1);
    }

    /* day header row */
    .day-header th {
      padding: 8px 10px;
      text-align: center;
      border-right: 1px solid var(--border);
      border-bottom: 2px solid var(--border);
      font-weight: 700;
      font-size: 12px;
      background: #fff;
    }
    .day-header th:first-child { width: 90px; background: #f9fafb; }
    .day-header th.today-col {
      background: var(--today-bg);
      border-bottom: 2px solid var(--today-border);
    }
    .day-header .day-name { display: block; font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .day-header .day-date { display: block; font-size: 14px; font-weight: 800; }

    /* section header rows */
    .section-header td {
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: #fff;
      border-right: 1px solid rgba(255,255,255,.2);
    }
    .section-header.mix-hd    td { background: var(--mix-hd); }
    .section-header.shape-hd  td { background: var(--shape-hd); }
    .section-header.vac-hd    td { background: var(--vac-hd); }
    .section-header.pack-hd   td { background: var(--pack-hd); }

    /* data rows */
    .data-row td {
      padding: 5px 10px;
      vertical-align: top;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      min-width: 100px;
    }
    .data-row td:first-child { min-width: 90px; }

    /* today column highlight */
    .today-col { background: var(--today-bg) !important; }

    /* alternating row colours per section */
    .mix-row   { background: var(--mix-row); }
    .mix-alt   { background: var(--mix-alt); }
    .shape-row { background: var(--shape-row); }
    .shape-alt { background: var(--shape-alt); }
    .vac-row   { background: var(--vac-row); }
    .vac-alt   { background: var(--vac-alt); }
    .pack-row  { background: var(--pack-row); }

    /* ── cell content ───────────────────────────────────────────────────────── */
    .cell-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      margin-bottom: 2px;
    }

    .product-pill {
      display: inline-flex;
      flex-direction: column;
      background: rgba(255,255,255,.8);
      border: 1px solid rgba(0,0,0,.08);
      border-radius: 6px;
      padding: 3px 6px;
      margin: 2px 0;
      line-height: 1.4;
      width: 100%;
    }
    .product-pill .prod-name  { font-weight: 600; font-size: 12px; }
    .product-pill .prod-sub   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .product-pill .prod-qty   { font-size: 11px; font-weight: 700; color: #374151; }
    .product-pill .prod-dluo  { font-size: 10px; color: #059669; font-weight: 600; }

    /* kg / quantity badge */
    .kg-badge {
      display: inline-block;
      background: #ddd6fe;
      color: #5b21b6;
      border-radius: 4px;
      padding: 2px 7px;
      font-size: 11px;
      font-weight: 700;
      margin-right: 4px;
    }
    .kg-badge.shape-kg { background: #bae6fd; color: #075985; }

    .empty-cell { color: #d1d5db; font-size: 11px; }

    /* dluo pill colours */
    .dluo-fixed { color: #b45309; }

    /* ── loading / error states ─────────────────────────────────────────────── */
    #loading, #error {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 300px; gap: 12px; color: var(--muted);
    }
    #error { color: #dc2626; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #4338ca;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── week nav ─────────────────────────────────────────────────────────────── */
    .week-nav {
      display: flex; align-items: center; gap: 8px;
    }
    .week-nav button {
      background: #4338ca; color: #fff;
      border: none; border-radius: 6px;
      padding: 5px 12px; font-size: 13px; cursor: pointer;
      transition: background .15s;
    }
    .week-nav button:hover { background: #3730a3; }
    .week-nav button:disabled { background: #6366f1; opacity: .5; cursor: default; }

    /* ── responsive ────────────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      .topbar { flex-direction: column; gap: 8px; align-items: flex-start; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px">
    <span style="font-size:22px">🥖</span>
    <h1>Atome Bakery — Production Schedule</h1>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="week-nav">
      <button id="prevWeek">◀</button>
      <span class="week-badge" id="weekBadge">W–</span>
      <button id="nextWeek">▶</button>
    </div>
    <div class="meta" id="metaLine">Loading…</div>
  </div>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--mix-hd)"></div> Mixing</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--shape-hd)"></div> Shaping / Scoring</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--vac-hd)"></div> Vacuuming / Packaging</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--pack-hd)"></div> Packaging only (copacked)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--today-border)"></div> Today</div>
</div>

<div class="schedule-wrap">
  <div id="loading"><div class="spinner"></div><span>Loading schedule…</span></div>
  <div id="error" style="display:none"></div>
  <div id="scheduleRoot" style="display:none"></div>
</div>

<script>
// ── helpers ──────────────────────────────────────────────────────────────────
const isoToday = () => new Date().toISOString().slice(0, 10);

function mondayOfWeek(iso) {
  const d = new Date(iso + "T00:00:00");
  const day = d.getDay() === 0 ? 6 : d.getDay() - 1;
  d.setDate(d.getDate() - day);
  return d.toISOString().slice(0, 10);
}

function addDays(iso, n) {
  const d = new Date(iso + "T00:00:00");
  d.setDate(d.getDate() + n);
  return d.toISOString().slice(0, 10);
}

function fmtDate(iso) {
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short" });
}

function fmtDluo(iso) {
  if (!iso) return null;
  const d = new Date(iso + "T00:00:00");
  return d.toLocaleDateString("en-GB", { day: "2-digit", month: "short", year: "numeric" });
}

// ── state ────────────────────────────────────────────────────────────────────
let scheduleData = null;
let viewWeekStart = mondayOfWeek(isoToday());  // always a Monday

// ── data loading ──────────────────────────────────────────────────────────────
async function loadSchedule() {
  const response = await fetch("data/schedule.json?t=" + Date.now());
  if (!response.ok) throw new Error(`HTTP ${response.status}`);
  return response.json();
}

// ── render ────────────────────────────────────────────────────────────────────
function getDayData(dayIso) {
  if (!scheduleData) return null;
  return scheduleData.days.find(d => d.date === dayIso) || null;
}

function renderPill(content) {
  const el = document.createElement("div");
  el.className = "product-pill";
  el.innerHTML = content;
  return el;
}

function renderMixCell(day) {
  if (!day || !day.mix || day.mix.length === 0) return '<span class="empty-cell">–</span>';
  return day.mix.map(m => {
    const kgStr = m.total_kg != null
      ? `<span class="kg-badge">${m.total_kg} kg</span>`
      : m.total_units
        ? `<span class="kg-badge">${m.total_units} pcs</span>`
        : "";
    const prodNames = (m.products || []).join(" · ");
    return `<div class="product-pill">
      <span class="prod-name">${m.label}</span>
      <span class="prod-qty">${kgStr}</span>
      <span class="prod-sub">${prodNames}</span>
    </div>`;
  }).join("");
}

function renderShapeCell(day) {
  if (!day || !day.shaping || day.shaping.length === 0) return '<span class="empty-cell">–</span>';
  return day.shaping.map(s => {
    const kgStr = s.total_kg != null ? `<span class="kg-badge shape-kg">${s.total_kg} kg</span>` : "";
    const unitStr = s.qty_units ? `<b>${s.qty_units}</b> units` : "";
    const qtyStr = [kgStr, unitStr].filter(Boolean).join(" ");
    return `<div class="product-pill">
      <span class="prod-name">${s.name}</span>
      <span class="prod-qty">${qtyStr}</span>
      <span class="prod-sub">${s.mo_ref || ""}</span>
    </div>`;
  }).join("");
}

function renderVacCell(day) {
  if (!day || !day.vacuuming || day.vacuuming.length === 0) return '<span class="empty-cell">–</span>';
  return day.vacuuming.map(v => {
    const dluoStr = v.dluo
      ? `<span class="prod-dluo">DLUO ${fmtDluo(v.dluo)}</span>`
      : `<span class="prod-dluo dluo-fixed">DLUO fixed</span>`;
    const qtyStr = v.qty_packs ? `<b>${Math.round(v.qty_packs)}</b> packs` : "";
    return `<div class="product-pill">
      <span class="prod-name">${v.name}</span>
      <span class="prod-qty">${qtyStr}</span>
      ${dluoStr}
      <span class="prod-sub">${v.mo_ref || ""}</span>
    </div>`;
  }).join("");
}

function buildScheduleTable(weekStart) {
  const today = isoToday();
  const days = Array.from({length: 7}, (_, i) => addDays(weekStart, i));
  const dayLabels = ["MONDAY", "TUESDAY", "WEDNESDAY", "THURSDAY", "FRIDAY", "SATURDAY", "SUNDAY"];

  const table = document.createElement("table");
  table.className = "schedule";

  // ── day header row ────────────────────────────────────────────────────────
  const headRow = document.createElement("tr");
  headRow.className = "day-header";
  const emptyTh = document.createElement("th");
  headRow.appendChild(emptyTh);

  days.forEach((d, i) => {
    const th = document.createElement("th");
    if (d === today) th.className = "today-col";
    th.innerHTML = `<span class="day-name">${dayLabels[i]}</span>
                    <span class="day-date">${fmtDate(d)}</span>
                    ${d === today ? '<span style="font-size:10px;color:var(--today-border);font-weight:700">TODAY</span>' : ""}`;
    headRow.appendChild(th);
  });
  table.appendChild(headRow);

  // ── helper: build a section ───────────────────────────────────────────────
  function addSection(label, sectionClass, hdClass, rowBase, altBase, renderFn) {
    // section header
    const hdrRow = document.createElement("tr");
    hdrRow.className = `section-header ${hdClass}`;
    const hdrTd = document.createElement("td");
    hdrTd.colSpan = 8;
    hdrTd.textContent = label;
    hdrRow.appendChild(hdrTd);
    table.appendChild(hdrRow);

    // find max rows needed across all days
    const dayDatas = days.map(d => getDayData(d));
    const maxItems = Math.max(1, ...dayDatas.map(dd => {
      if (!dd) return 0;
      if (sectionClass === "mix-section")   return (dd.mix || []).length;
      if (sectionClass === "shape-section") return (dd.shaping || []).length;
      if (sectionClass === "vac-section")   return (dd.vacuuming || []).length;
      return 0;
    }));

    // single row (cells wrap naturally)
    const row = document.createElement("tr");
    row.className = `data-row ${sectionClass} ${rowBase}`;

    const labelTd = document.createElement("td");
    labelTd.className = rowBase;
    labelTd.innerHTML = `<span class="cell-label">${label}</span>`;
    row.appendChild(labelTd);

    days.forEach((d, i) => {
      const td = document.createElement("td");
      td.className = `${rowBase}${d === today ? " today-col" : ""}`;
      td.innerHTML = renderFn(getDayData(d));
      row.appendChild(td);
    });
    table.appendChild(row);
  }

  addSection("🟣  MIXING",    "mix-section",   "mix-hd",   "mix-row",   "mix-alt",   renderMixCell);
  addSection("🔵  SHAPING",   "shape-section", "shape-hd", "shape-row", "shape-alt", renderShapeCell);
  addSection("🟢  VACUUMING", "vac-section",   "vac-hd",   "vac-row",   "vac-alt",   renderVacCell);

  return table;
}

function render() {
  const root = document.getElementById("scheduleRoot");
  root.innerHTML = "";
  root.appendChild(buildScheduleTable(viewWeekStart));
  root.style.display = "block";

  // update week badge
  const wn = scheduleData?.week_number;
  document.getElementById("weekBadge").textContent = wn
    ? `W${wn + (viewWeekStart > scheduleData.week_start ? 1 : 0)}`
    : `Week of ${fmtDate(viewWeekStart)}`;

  // meta
  const gen = scheduleData?.generated_at
    ? new Date(scheduleData.generated_at).toLocaleString("en-GB", {dateStyle:"medium", timeStyle:"short"})
    : "?";
  document.getElementById("metaLine").innerHTML = `Last refresh: ${gen}<br/>MOs: ${(scheduleData?.days || []).reduce((s,d) => s + (d.vacuuming||[]).length, 0)} products this fortnight`;

  // nav buttons
  const dataStart = scheduleData?.week_start;
  const dataEnd   = scheduleData?.week_end;
  document.getElementById("prevWeek").disabled = viewWeekStart <= (dataStart || viewWeekStart);
  document.getElementById("nextWeek").disabled = addDays(viewWeekStart, 7) > (dataEnd || viewWeekStart);
}

// ── init ──────────────────────────────────────────────────────────────────────
document.getElementById("prevWeek").addEventListener("click", () => {
  viewWeekStart = addDays(viewWeekStart, -7);
  render();
});
document.getElementById("nextWeek").addEventListener("click", () => {
  viewWeekStart = addDays(viewWeekStart, 7);
  render();
});

(async () => {
  try {
    scheduleData = await loadSchedule();
    // Jump to the week that contains today if it's in the data
    const dataStart = scheduleData.week_start;
    const dataEnd   = scheduleData.week_end;
    const todayMonday = mondayOfWeek(isoToday());
    if (todayMonday >= dataStart && todayMonday <= dataEnd) {
      viewWeekStart = todayMonday;
    } else {
      viewWeekStart = mondayOfWeek(dataStart);
    }

    document.getElementById("loading").style.display = "none";
    render();
  } catch (err) {
    document.getElementById("loading").style.display = "none";
    const errEl = document.getElementById("error");
    errEl.style.display = "flex";
    errEl.innerHTML = `<b>Could not load schedule</b><br/>${err.message}<br/>
      <small>Make sure <code>data/schedule.json</code> exists. Run <code>python scripts/fetch_schedule.py --dry-run</code> to generate a placeholder.</small>`;
  }
})();
</script>
</body>
</html>
